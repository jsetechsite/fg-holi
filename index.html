<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Food Gang's Holi Color Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F2F1 60%, #fef3c7 100%);
            overflow: hidden;
        }

        /* Festive Background Elements */
        .sun {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFFDE7 0%, #FFF176 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #FFF9C4;
        }
        .temple-silhouette {
            position: absolute;
            bottom: 20vh;
            left: 0;
            width: 100%;
            height: 30vh;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" preserveAspectRatio="none"><path d="M0 300 L0 250 L50 200 L100 250 L150 180 L200 250 L250 100 L300 250 L350 200 L400 250 L450 150 L500 250 L1000 250 L1000 300 Z" fill="%23b2dfdb" opacity="0.4"/></svg>');
            background-size: cover;
            z-index: 2;
        }
        .buntings {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M0 0 Q25 20 50 0 Q75 20 100 0" fill="none" stroke="%23ff4081" stroke-width="1"/><path d="M10 8 L15 15 L20 8 Z" fill="%23FFD700"/><path d="M35 8 L40 15 L45 8 Z" fill="%23FF4500"/><path d="M60 8 L65 15 L70 8 Z" fill="%2332CD32"/><path d="M85 8 L90 15 L95 8 Z" fill="%231E90FF"/></svg>');
            background-repeat: repeat-x;
            background-size: 200px 40px;
            z-index: 70;
        }

        .powder {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(4px);
            opacity: 0.9;
            z-index: 45;
        }
        .character {
            position: absolute;
            bottom: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 18vw;
            max-width: 90px;
            min-width: 65px;
            height: auto;
            z-index: 55;
            pointer-events: none;
            will-change: left;
        }
        @keyframes dance {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
            25% { transform: translateX(-50%) translateY(-10px) rotate(-3deg); }
            75% { transform: translateX(-50%) translateY(-10px) rotate(3deg); }
        }
        .dancing { animation: dance 0.6s infinite ease-in-out; }

        .npc {
            position: absolute;
            bottom: 10vh;
            width: 12vw;
            max-width: 65px;
            min-width: 45px;
            height: auto;
            z-index: 10;
            opacity: 0.85;
        }
        .npc-foreground {
            z-index: 60;
            bottom: -3vh;
            filter: brightness(0.7);
        }

        .splat {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            animation: splat-fade 1.2s forwards;
        }
        @keyframes splat-fade {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        .ui-panel {
            position: absolute;
            top: env(safe-area-inset-top, 25px);
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 85;
            pointer-events: none;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 8px 18px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            font-weight: 900;
            color: #c026d3;
            border: 3px solid #ec4899;
        }
        
        /* Control Buttons */
        .controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }
        .control-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 5px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            font-weight: bold;
            pointer-events: auto;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: background 0.2s;
        }
        .control-btn.active {
            background: rgba(236, 72, 153, 0.8);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="sun"></div>
    <div class="temple-silhouette"></div>
    <div class="buntings"></div>

    <div class="ui-panel">
        <div class="stat-box">Score: <span id="score">0</span></div>
        <div class="stat-box">Time: <span id="timer">60</span>s</div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="overlay">
        <h1 class="text-pink-500 font-bold text-5xl md:text-7xl mb-2 drop-shadow-lg">Food Gang's</h1>
        <h2 class="text-yellow-400 font-black text-4xl md:text-6xl mb-6 uppercase tracking-wider">Holi Color Dash</h2>
        <p class="text-xl md:text-2xl mb-8 max-w-lg text-yellow-100">Hold the <b>Left</b> and <b>Right</b> buttons to move!<br>Dodge <span class="text-black font-bold px-2 bg-white rounded">BLACK</span> powder!</p>
        <button id="start-btn" class="bg-gradient-to-r from-pink-600 to-orange-500 text-white font-black py-5 px-14 rounded-full text-2xl md:text-3xl transition-all hover:scale-105 active:scale-90 shadow-2xl border-4 border-white cursor-pointer">
            START FESTIVAL
        </button>
    </div>

    <!-- End Overlay -->
    <div id="end-overlay" class="overlay hidden">
        <h1 class="text-5xl md:text-6xl font-black mb-4 text-yellow-400">Holi Hai!</h1>
        <p class="text-2xl md:text-3xl mb-8">Final Score: <span id="final-score" class="font-bold text-pink-500">0</span></p>
        <button id="restart-btn" class="bg-white text-pink-600 font-black py-4 px-12 rounded-full text-xl md:text-2xl transition-transform active:scale-95 shadow-xl cursor-pointer">
            TRY AGAIN
        </button>
    </div>

    <div id="crowd-layer-back"></div>
    
    <div id="player" class="character dancing">
        <svg viewBox="0 0 100 150">
            <circle cx="50" cy="30" r="20" fill="#ffdbac" />
            <path id="player-kurta" d="M30 50 L70 50 L80 110 L20 110 Z" fill="#ffffff" />
            <rect id="player-leg-l" x="35" y="110" width="10" height="30" fill="#ffffff" />
            <rect id="player-leg-r" x="55" y="110" width="10" height="30" fill="#ffffff" />
            <path d="M30 60 Q10 80 20 100" stroke="#ffdbac" stroke-width="8" fill="none" />
            <path d="M70 60 Q90 80 80 100" stroke="#ffdbac" stroke-width="8" fill="none" />
        </svg>
    </div>

    <div id="crowd-layer-front"></div>

    <!-- Gameplay Controls -->
    <div class="controls">
        <div id="btn-left" class="control-btn">←</div>
        <div id="btn-right" class="control-btn">→</div>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const startOverlay = document.getElementById('start-overlay');
    const endOverlay = document.getElementById('end-overlay');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const backCrowd = document.getElementById('crowd-layer-back');
    const frontCrowd = document.getElementById('crowd-layer-front');
    
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let spawnTimer, gameTimerInterval, musicLoop;
    let audioCtx;
    let npcs = [];
    
    let playerPos = window.innerWidth / 2;
    let moveDirection = 0; // -1 for left, 1 for right, 0 for none
    const moveSpeed = 8; // Pixels per frame for smooth movement

    const holiColors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500'];
    const skinTones = ['#8d5524', '#c68642', '#e0ac69', '#f1c27d', '#ffdbac'];

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playDrum(isHeavy) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(isHeavy ? 60 : 120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(isHeavy ? 0.3 : 0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function startPercussion() {
        if (musicLoop) clearInterval(musicLoop);
        let beat = 0;
        musicLoop = setInterval(() => {
            if (!gameActive) return;
            if (beat % 8 === 0) playDrum(true);
            else if (beat % 8 === 3 || beat % 8 === 6) playDrum(false);
            beat = (beat + 1) % 8;
        }, 300);
    }

    function createNPCs() {
        backCrowd.innerHTML = ''; frontCrowd.innerHTML = '';
        npcs = [];
        const count = window.innerWidth < 600 ? 10 : 18;
        for (let i = 0; i < count; i++) {
            const isFront = i % 5 === 0;
            const npc = document.createElement('div');
            npc.className = `npc ${isFront ? 'npc-foreground' : ''}`;
            npc.style.left = (i * (100 / count)) + '%';
            const skin = skinTones[Math.floor(Math.random() * skinTones.length)];
            const kurta = holiColors[Math.floor(Math.random() * holiColors.length)];
            npc.innerHTML = `<svg viewBox="0 0 100 150"><circle cx="50" cy="30" r="20" fill="${skin}" /><path d="M30 50 L70 50 L80 110 L20 110 Z" fill="${isFront ? '#ffffff' : kurta}" /></svg>`;
            (isFront ? frontCrowd : backCrowd).appendChild(npc);
            npcs.push(npc);
        }
    }

    // BUTTON MOVEMENT LOOP
    function updateMovement() {
        if (!gameActive) return;
        
        if (moveDirection !== 0) {
            playerPos += moveDirection * moveSpeed;
            // Boundaries
            playerPos = Math.max(40, Math.min(window.innerWidth - 40, playerPos));
            player.style.left = `${playerPos}px`;
        }
        requestAnimationFrame(updateMovement);
    }

    // Input Listeners
    const setMove = (dir, btn) => {
        moveDirection = dir;
        if (dir !== 0) btn.classList.add('active');
        else {
            btnLeft.classList.remove('active');
            btnRight.classList.remove('active');
        }
    };

    btnLeft.addEventListener('pointerdown', () => setMove(-1, btnLeft));
    btnRight.addEventListener('pointerdown', () => setMove(1, btnRight));
    
    window.addEventListener('pointerup', () => setMove(0));
    window.addEventListener('pointercancel', () => setMove(0));

    function startGame() {
        initAudio();
        createNPCs();
        score = 0;
        timeLeft = 60;
        gameActive = true;
        playerPos = window.innerWidth / 2;
        player.style.left = `${playerPos}px`;
        
        scoreEl.innerText = score;
        timerEl.innerText = timeLeft;
        startOverlay.classList.add('hidden');
        endOverlay.classList.add('hidden');
        
        document.querySelectorAll('.powder, .splat').forEach(e => e.remove());

        if (spawnTimer) clearInterval(spawnTimer);
        if (gameTimerInterval) clearInterval(gameTimerInterval);
        
        spawnTimer = setInterval(spawnColor, 400);
        gameTimerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);

        startPercussion();
        requestAnimationFrame(updateMovement);
    }

    function spawnColor() {
        if (!gameActive) return;
        const source = npcs[Math.floor(Math.random() * npcs.length)];
        source.classList.add('animate-bounce');
        setTimeout(() => source.classList.remove('animate-bounce'), 300);

        const powder = document.createElement('div');
        const isBlack = Math.random() < 0.18; 
        const color = isBlack ? '#000000' : holiColors[Math.floor(Math.random() * holiColors.length)];
        powder.className = 'powder';
        powder.style.width = powder.style.height = '25px';
        powder.style.backgroundColor = color;
        
        const rect = source.getBoundingClientRect();
        let curX = rect.left + rect.width / 2;
        let curY = rect.top;
        let vY = -12 - Math.random() * 5;
        let vX = ((playerPos - curX) / 45) + (Math.random() * 4 - 2);

        container.appendChild(powder);

        const move = setInterval(() => {
            if (!gameActive) { clearInterval(move); powder.remove(); return; }
            vY += 0.5;
            curX += vX;
            curY += vY;
            powder.style.left = `${curX}px`;
            powder.style.top = `${curY}px`;

            const pRect = player.getBoundingClientRect();
            if (curY > pRect.top && curY < pRect.bottom && curX > pRect.left && curX < pRect.right) {
                onHit(isBlack, color, curX, curY);
                clearInterval(move);
                powder.remove();
            }
            if (curY > window.innerHeight) { clearInterval(move); powder.remove(); }
        }, 16);
    }

    function onHit(isBlack, color, x, y) {
        const splat = document.createElement('div');
        splat.className = 'splat';
        splat.style.left = `${x - 40}px`;
        splat.style.top = `${y - 40}px`;
        splat.innerHTML = `<svg width="80" height="80" viewBox="0 0 100 100"><path d="M50 10 Q90 10 95 45 T55 90 T10 70 T30 25 Z" fill="${color}"/></svg>`;
        container.appendChild(splat);
        setTimeout(() => splat.remove(), 1200);

        if (isBlack) {
            score = Math.max(0, score - 50);
            player.style.filter = 'brightness(0) saturate(0)';
            setTimeout(() => player.style.filter = '', 400);
        } else {
            score += 20;
            document.getElementById('player-kurta').style.fill = color;
        }
        scoreEl.innerText = score;
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnTimer);
        clearInterval(gameTimerInterval);
        clearInterval(musicLoop);
        document.getElementById('final-score').innerText = score;
        endOverlay.classList.remove('hidden');
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    window.addEventListener('resize', createNPCs);
    createNPCs();
</script>

</body>
</html>
